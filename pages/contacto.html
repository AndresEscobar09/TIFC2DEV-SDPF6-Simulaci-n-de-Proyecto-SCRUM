  <section id="contacto" class="bg-light py-5">
      <div class="container">

          <div class="row justify-content-center">
              <div class="col-lg-8">

                  <div class="text-center mb-4">
                      <h2 class="display-6 fw-bold">
                          Contáctanos
                      </h2>
                      <p class="text-secondary">
                          Estamos disponibles para resolver tus dudas y brindarte más información.
                      </p>
                  </div>

                  <form id="form-contact" class="bg-white p-4 rounded shadow-sm">
                      <div class="mb-3">
                          <input
                              id="name"
                              type="text"
                              class="form-control"
                              placeholder="Nombre"
                              required>
                      </div>

                      <div class="mb-3">
                          <input
                          id="email"
                              type="email"
                              class="form-control"
                              placeholder="Correo electrónico"
                              required>
                      </div>

                      <div class="mb-3">
                          <input
                              id="subject"
                              type="text"
                              class="form-control"
                              placeholder="Asunto"
                              required>
                      </div>

                      <div class="mb-3">
                          <textarea
                          id="message"
                              class="form-control"
                              rows="5"
                              placeholder="Escribe tu mensaje"
                              required></textarea>
                      </div>

                      <button id="btn-form" type="submit" class="btn btn-primary w-100">
                          Enviar Mensaje
                      </button>
                  </form>

                  <div class="d-flex flex-column flex-md-row justify-content-center gap-3 mt-4">
                      <a href="mailto:contacto@gmail.com" class="btn btn-outline-primary">
                          Correo: contacto@gmail.com
                      </a>

                      <a href="tel:3001234567" class="btn btn-outline-primary">
                          Teléfono: 3001234567
                      </a>
                  </div>

              </div>
          </div>

      </div>
      <div id="message-container"></div>
  </section>
