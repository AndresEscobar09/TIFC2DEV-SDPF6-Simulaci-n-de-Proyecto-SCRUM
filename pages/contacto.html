<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./../assets/css/nav.css" />
    <link rel="stylesheet" href="./../assets/css/contacto.css" />
    <title>Document</title>
  </head>
  <body>
    <header id="navbar">
         <nav class="navbar navbar-expand-lg bg-light shadow-sm">
      <div class="container">
        <img id="logo-nav" src="./../assets/icons/logo.svg" alt="logo">

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarMenu"
          aria-controls="navbarMenu"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse justify-content-center" id="navbarMenu">
          <ul class="navbar-nav text-center">
            <li class="nav-item px-3">
              <a class="nav-link" href="./../index.html">Inicio</a>
            </li>
            <li class="nav-item px-3">
              <a class="nav-link" href="#">Quiénes Somos</a>
            </li>
            <li class="nav-item px-3">
              <a class="nav-link" href="./contacto.html">Contacto</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    </header>

    <section id="contacto">
      <div class="contenedor-contacto">
        <div class="info">
          <h2 class="titulo">Contáctanos</h2>
          <p class="texto">
            Estamos disponibles para resolver tus dudas y brindarte más
            información.
          </p>
        </div>

        <form class="formulario">
          <input class="input" type="text" placeholder="Nombre" required />
          <input
            class="input"
            type="email"
            placeholder="Correo electrónico"
            required
          />
          <input class="input" type="text" placeholder="Asunto" required />

          <textarea
            class="textarea"
            rows="5"
            placeholder="Escribe tu mensaje"
            required
          ></textarea>

          <button class="boton" type="submit">Enviar Mensaje</button>
        </form>
        <div class="contenedor-contacto-email">
          <a href="mailto:contacto@gmail.com">
            <button class="boton" type="button">correo: contacto@gmail.com</button>
          </a>
          <a href="tel:3001234567">
            <button class="boton" type="button">Telefono: 3001234567</button>
          </a>
        </div>
      </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./../js/app.js"></script>
  </body>
</html>
